<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walki-Talki | Secure</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e272e">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=4.0">
</head>
<body>

    <div id="transfer-warning" class="transfer-warning" style="display: none;">
        ⚠️ Transferring... <b>Keep App Open!</b>
    </div>

    <div id="video-overlay" class="overlay" style="display: none; background: #000; z-index: 4000;">
        <div class="video-container">
            <video id="remote-video" autoplay playsinline class="call-video"></video>
            <video id="local-video" autoplay muted playsinline class="call-video"></video>
            
            <div id="voice-ui" class="voice-ui" style="display:none;">
                <div class="pulsing-avatar">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Call" id="call-avatar-img">
                </div>
                <h3 id="call-peer-name" style="margin-top:20px; color:white;">Connected</h3>
                <p id="call-timer" style="color:#ccc;">00:00</p>
            </div>

            <div class="call-controls">
                <button onclick="toggleMute()" id="mute-btn" class="c-btn"><span class="material-icons-outlined">mic</span></button>
                <button onclick="endCall()" class="c-btn hangup"><span class="material-icons-outlined">call_end</span></button>
                <button onclick="toggleCamera()" id="cam-btn" class="c-btn"><span class="material-icons-outlined">videocam</span></button>
            </div>
            <p id="call-status">Connecting...</p>
        </div>
    </div>

    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>
    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

    <div id="request-popup" class="overlay" style="display: none; background: rgba(0,0,0,0.8); z-index: 9999;">
        <div class="request-card">
            <p id="request-msg">Connect request...</p>
            <div class="request-btns">
                <button id="accept-btn" class="btn-success">Accept</button>
                <button id="reject-btn" class="btn-danger">Reject</button>
            </div>
        </div>
    </div>

    <div id="voice-overlay" class="overlay" style="display: none; z-index: 3000;">
        <div class="voice-card">
            <h3>Recording...</h3>
            <div class="waveform"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
            <div class="voice-controls">
                <button onclick="cancelVoice()" class="btn-danger">Cancel</button>
                <button onclick="stopAndSend()" class="btn-success">⏹ Stop & Send</button>
            </div>
        </div>
    </div>

    <div id="welcome-guide" class="overlay" style="display: none; background: rgba(0,0,0,0.9); z-index: 2500;">
        <div class="request-card">
            <h2 style="color: #00d1b2;">Welcome! 👋</h2>
            <p style="margin: 15px 0; font-size: 14px; line-height: 1.5; color:#ddd;">
                1. Share your ID with a friend.<br>
                2. Enter their ID and click Connect.<br>
                3. Keep app open for big files!
            </p>
            <button onclick="closeGuide()" class="btn-primary" style="width:100%">Got it!</button>
        </div>
    </div>

    <div id="login-screen" class="overlay" style="z-index: 1000;">
        <div class="login-card">
            <h3 class="brand">Walki-Talki</h3>
            <div class="avatar-area">
                <div class="avatar-row">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-pick active" onclick="selectAvatar(this)">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-pick" onclick="selectAvatar(this)">
                </div>
            </div>
            <input type="text" id="chosen-id" placeholder="Create your ID">
            <button id="start-btn" onclick="startApp()" class="btn-primary">Start</button>
        </div>
    </div>

    <div class="main-container" id="main-app" style="display: none;">
        <header class="chat-header">
            <div class="u-info">
                <div class="mini-frame"><img id="my-avatar-display"></div>
                <b id="display-name"></b>
            </div>
            <div class="header-tools">
                <button class="icon-btn" onclick="startVoiceCall()"><span class="material-icons-outlined">call</span></button> 
                <button class="icon-btn" onclick="startVideoCall()"><span class="material-icons-outlined">videocam</span></button> 
                <button onclick="location.reload()" class="logout-btn"><span class="material-icons-outlined">logout</span></button>
            </div>
        </header>

        <div class="connect-bar">
            <div class="input-wrap">
                <input type="text" id="friend-id" placeholder="Friend's ID" oninput="checkFriendStatus()">
                <span id="status-dot" class="dot offline"></span>
            </div>
            <button id="connect-btn" class="btn-connect">Connect</button>
        </div>

        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <button class="btn-icon" onclick="document.getElementById('file-upload').click()"><span class="material-icons-outlined">attach_file</span></button>
            <input type="file" id="file-upload" hidden onchange="startFileTransfer(this)">
            <button id="mic-btn" class="btn-icon" onclick="openVoicePopup()"><span class="material-icons-outlined">mic</span></button>
            <input type="text" id="message-input" placeholder="Message...">
            <button id="send-btn" class="btn-send"><span class="material-icons-outlined">send</span></button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="js/peer-logic.js?v=4.0"></script>
    <script src="js/ui-manager.js?v=4.0"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Failed', err));
            });
        }
    </script>
</body>
</html>
