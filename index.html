<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walki-Talki | Secure</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e272e">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=6.0">
</head>
<body>

    <div id="video-overlay" class="overlay" style="display: none; background: #000; z-index: 4000;">
        <div class="video-container">
            <video id="remote-video" autoplay playsinline class="call-video"></video>
            <video id="local-video" autoplay muted playsinline class="call-video"></video>
            <div class="call-controls">
                <button onclick="toggleMute()" class="c-btn"><span class="material-icons-outlined">mic</span></button>
                <button onclick="endCall()" class="c-btn" style="background:#ff4757;"><span class="material-icons-outlined">call_end</span></button>
                <button onclick="toggleCamera()" class="c-btn"><span class="material-icons-outlined">videocam</span></button>
            </div>
        </div>
    </div>

    <div id="request-popup" class="overlay" style="display: none; z-index: 9999;">
        <div class="request-card">
            <p id="request-msg">Connect request...</p>
            <div class="request-btns" style="display:flex; gap:10px; margin-top:20px;">
                <button id="accept-btn" class="btn-primary" style="background:#2ecc71; color:white; flex:1;">Accept</button>
                <button id="reject-btn" class="btn-primary" style="background:#ff4757; color:white; flex:1;">Reject</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="overlay" style="z-index: 1000;">
        <div class="login-card">
            <h3 class="brand">Walki-Talki</h3>
            <div class="avatar-row">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-pick active" onclick="selectAvatar(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-pick" onclick="selectAvatar(this)">
            </div>
            <input type="text" id="chosen-id" placeholder="Create your ID">
            <button onclick="startApp()" class="btn-primary">Start App</button>
        </div>
    </div>

    <div class="main-container" id="main-app" style="display: none;">
        <header class="chat-header">
            <div class="u-info" style="display:flex; align-items:center; gap:10px;">
                <img id="my-avatar-display" style="width:35px; border-radius:50%; border:2px solid #00d1b2;">
                <b id="display-name" style="font-size:14px;"></b>
            </div>
            <div class="header-tools">
                <button onclick="startVideoCall()" style="background:none; border:none; color:#ccc;"><span class="material-icons-outlined">videocam</span></button>
                <button onclick="openHistoryMenu()" style="background:none; border:none; color:#ccc; margin-left:10px;"><span class="material-icons-outlined">history</span></button>
            </div>
        </header>

        <div class="connect-bar">
            <input type="text" id="friend-id" placeholder="Friend ID" style="flex:1;">
            <div id="status-dot" class="dot offline" style="width:10px; height:10px; border-radius:50%; background:#7f8fa6;"></div>
            <button id="connect-btn" class="btn-primary" style="width:auto; padding:10px 15px;">Connect</button>
        </div>

        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <button onclick="openVoicePopup()" style="background:none; border:none; color:#ccc;"><span class="material-icons-outlined">mic</span></button>
            <input type="text" id="message-input" placeholder="Message...">
            <button id="send-btn" class="btn-send"><span class="material-icons-outlined">send</span></button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="js/peer-logic.js?v=6.0"></script>
    <script src="js/ui-manager.js?v=6.0"></script>
</body>
</html>
