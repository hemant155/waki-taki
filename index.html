<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walki-Talki | Secure</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e272e">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=11.0">
</head>
<body>

    <div id="transfer-warning" class="transfer-warning" style="display: none;">
        ⚠️ Transferring... <b>Keep App Open!</b>
    </div>

    <div id="video-overlay" class="overlay" style="display: none; background: #000; z-index: 5000;">
        <div class="video-container">
            <video id="remote-video" autoplay playsinline class="call-video"></video>
            <video id="local-video" autoplay muted playsinline class="call-video"></video>
            <div class="call-controls">
                <button onclick="toggleMute()" class="c-btn"><span class="material-icons-outlined">mic</span></button>
                <button onclick="endCall()" class="c-btn hangup"><span class="material-icons-outlined">call_end</span></button>
                <button onclick="toggleCamera()" class="c-btn"><span class="material-icons-outlined">videocam</span></button>
            </div>
        </div>
    </div>

    <div id="welcome-guide" class="overlay" style="display: none; background: rgba(0,0,0,0.95); z-index: 9000;">
        <div class="request-card">
            <h2 style="color: #00d1b2;">Welcome! 👋</h2>
            <p style="margin: 15px 0; font-size: 14px; line-height: 1.6; color:#ddd;">
                1. Share ID with a friend.<br>
                2. Enter Friend ID and Connect.<br>
                3. Keep app open for big files!
            </p>
            <button onclick="closeGuide()" class="btn-primary" style="width:100%;">Got it!</button>
        </div>
    </div>

    <div id="request-popup" class="overlay" style="display: none; z-index: 9999;">
        <div class="request-card">
            <p id="request-msg">Connect request...</p>
            <div class="request-btns">
                <button id="accept-btn" class="btn-connect">Accept</button>
                <button id="reject-btn" class="btn-danger">Reject</button>
            </div>
        </div>
    </div>

    <div id="history-popup" class="overlay" style="display: none; z-index: 4000;">
        <div class="request-card">
            <h3>Saved Chats</h3>
            <div id="history-list" class="history-list"></div>
            <button onclick="document.getElementById('history-popup').style.display='none'" class="btn-danger" style="width:100%; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="voice-overlay" class="overlay" style="display: none; z-index: 5000;">
        <div class="voice-card">
            <h3>Recording...</h3>
            <div class="waveform"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
            <div class="voice-controls">
                <button onclick="cancelVoice()" class="btn-danger">Cancel</button>
                <button onclick="stopAndSend()" class="btn-connect">Stop & Send</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="overlay" style="z-index: 1000;">
        <div class="login-card">
            <h3 class="brand">Walki-Talki</h3>
            <div class="avatar-row">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-pick active" onclick="selectAvatar(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-pick" onclick="selectAvatar(this)">
                <div class="upload-btn" onclick="document.getElementById('file-input').click()">+</div>
                <input type="file" id="file-input" hidden accept="image/*" onchange="handleFileUpload(this)">
                <img id="custom-preview" class="avatar-pick" style="display:none">
            </div>
            <input type="text" id="chosen-id" placeholder="Create your ID">
            <button onclick="startApp()" class="btn-primary">Start App</button>
        </div>
    </div>

    <div class="main-container" id="main-app" style="display: none;">
        <header class="chat-header">
            <div class="u-info" style="display:flex; align-items:center; gap:10px;">
                <img id="my-avatar-display" style="width:35px; border-radius:50%; border:2px solid #00d1b2;">
                <div style="display:flex; flex-direction:column;">
                    <b id="display-name" style="font-size:14px;"></b>
                    <span onclick="shareMyID()" style="font-size:10px; color:#00d1b2; cursor:pointer;">Copy ID</span>
                </div>
            </div>
            <div class="header-tools">
                <button class="icon-btn" onclick="startVoiceCall()"><span class="material-icons-outlined">call</span></button> 
                <button class="icon-btn" onclick="startVideoCall()"><span class="material-icons-outlined">videocam</span></button> 
                <button class="icon-btn" id="save-chat-btn">💾</button>
                <button class="icon-btn" onclick="openHistoryMenu()"><span class="material-icons-outlined">history</span></button>
                <button onclick="location.reload()" class="icon-btn"><span class="material-icons-outlined">logout</span></button>
            </div>
        </header>

        <div class="connect-bar">
            <input type="text" id="friend-id" placeholder="Friend's ID" oninput="checkFriendStatus()">
            <div id="status-dot" class="dot offline"></div>
            <button id="connect-btn" class="btn-connect">Connect</button>
        </div>

        <div id="chat-box" class="chat-box">
             <div id="empty-state" style="text-align:center; color:#555; margin-top:50px;">
                <span class="material-icons-outlined" style="font-size:40px; opacity:0.3;">wifi_tethering</span>
                <p>Waiting for connection...</p>
            </div>
        </div>

        <div class="input-area">
            <button class="icon-btn" onclick="document.getElementById('file-upload-chat').click()"><span class="material-icons-outlined">attach_file</span></button>
            <input type="file" id="file-upload-chat" hidden onchange="sendFileInChunks(this.files[0])">
            <button class="icon-btn" onclick="openVoicePopup()"><span class="material-icons-outlined">mic</span></button>
            <input type="text" id="message-input" placeholder="Message...">
            <button id="send-btn" class="btn-send"><span class="material-icons-outlined">send</span></button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="js/peer-logic.js?v=11.0"></script>
    <script src="js/ui-manager.js?v=11.0"></script>
</body>
</html>
